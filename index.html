<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.A.S.H. Diagnostics v2.0</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <div id="top">
    <div class="brand">K<em>.</em>A<em>.</em>S<em>.</em>H<em>.</em> DIAGNOSTICS</div>
    <span class="badge">v2.0</span>
    <div class="spacer"></div>
    <span id="conn-info"><span class="led" id="led"></span><span id="conn-text">Disconnected</span></span>
  </div>

  <div id="toolbar">
    <span class="lbl">Port</span>
    <select id="port" title="Select serial port"></select>
    <button class="btn" id="btn-refresh">Refresh</button>
    <button class="btn primary" id="btn-connect">Connect</button>
    <button class="btn" id="btn-disconnect" disabled>Disconnect</button>
    <span class="spacer-toolbar"></span>
    <button class="btn" id="btn-scan" disabled>Scan DTCs</button>
    <button class="btn danger" id="btn-clear" disabled>Clear DTCs</button>
    <span class="spacer-toolbar"></span>
    <span class="lbl">Live</span>
    <button class="btn" id="btn-live" disabled>Start</button>
  </div>

  <div id="main">

    <div class="panel">
      <h2>Live Engine Data</h2>
      <div class="live">
        <div class="metric"><div class="k">RPM</div><div class="v"><span id="m-rpm">—</span></div></div>
        <div class="metric"><div class="k">Speed</div><div class="v"><span id="m-speed">—</span><span class="u">km/h</span></div></div>
        <div class="metric"><div class="k">Coolant</div><div class="v"><span id="m-coolant">—</span><span class="u">°C</span></div></div>
        <div class="metric"><div class="k">Intake Air</div><div class="v"><span id="m-intake">—</span><span class="u">°C</span></div></div>
        <div class="metric"><div class="k">Engine Load</div><div class="v"><span id="m-load">—</span><span class="u">%</span></div></div>
        <div class="metric"><div class="k">Throttle</div><div class="v"><span id="m-throttle">—</span><span class="u">%</span></div></div>
        <div class="metric"><div class="k">MAF</div><div class="v"><span id="m-maf">—</span><span class="u">g/s</span></div></div>
        <div class="metric"><div class="k">Fuel Level</div><div class="v"><span id="m-fuel">—</span><span class="u">%</span></div></div>
        <div class="metric"><div class="k">Battery</div><div class="v"><span id="m-volt">—</span><span class="u">V</span></div></div>
        <div class="metric"><div class="k">VIN</div><div class="v metric-vin"><span id="m-vin">—</span></div></div>
      </div>
    </div>

    <div class="panel">
      <h2>Console</h2>
      <div id="vin"></div>
      <div id="log"></div>
    </div>

    <div class="panel" id="dtc-panel">
      <h2>Diagnostic Trouble Codes</h2>
      <div id="dtc-list"><div class="empty">No scan run yet — connect and click "Scan DTCs"</div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let liveTimer = null;
let connected = false;

function log(msg, cls){
  const el = $('log');
  const line = document.createElement('div');
  if(cls) line.className = cls;
  const t = new Date().toTimeString().slice(0,8);
  line.textContent = '[' + t + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function toast(msg, type){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'on' + (type ? ' ' + type : '');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.className = '', 2400);
}

function setConnected(state, info){
  connected = state;
  $('led').classList.toggle('on', state);
  $('conn-text').textContent = state
    ? `Connected · ${info.port} · ${info.adapter || 'ELM327'} · Proto ${info.protocol_num || '?'}`
    : 'Disconnected';
  $('btn-connect').disabled    = state;
  $('btn-disconnect').disabled = !state;
  $('btn-scan').disabled       = !state;
  $('btn-clear').disabled      = !state;
  $('btn-live').disabled       = !state;
  if(!state){ stopLive(); resetMetrics(); }
}

function resetMetrics(){
  ['rpm','speed','coolant','intake','load','throttle','maf','fuel','volt','vin']
    .forEach(k => $('m-' + k).textContent = '—');
}

async function refreshPorts(){
  try {
    const r = await window.api.listPorts();
    const sel = $('port');
    sel.innerHTML = '';
    if(!r.ports.length){
      const o = document.createElement('option');
      o.value = ''; o.textContent = 'No COM ports found';
      sel.appendChild(o);
      log('No COM ports detected — plug in ELM327 USB adapter', 'err');
      return;
    }
    r.ports.forEach(p => {
      const o = document.createElement('option');
      o.value = p.device;
      o.textContent = `${p.device} — ${p.desc || 'serial'}`;
      sel.appendChild(o);
    });
    log(`Found ${r.ports.length} port(s)`, 'ok');
  } catch(e) { log('listPorts: ' + e.message, 'err'); }
}

async function connect(){
  const port = $('port').value || null;
  log('Opening ELM327 on ' + (port || 'auto') + '...', 'inf');
  try {
    const info = await window.api.connect(port);
    setConnected(true, info);
    log(`Connected · ${info.adapter} · ISO protocol ${info.protocol_num}`, 'ok');
    toast('Connected to ' + info.port, 'ok');
  } catch(e) {
    log('Connect failed: ' + e.message, 'err');
    toast('Connect failed: ' + e.message, 'err');
  }
}

async function disconnect(){
  try { await window.api.disconnect(); } catch(_){}
  setConnected(false, {});
  log('Disconnected', 'inf');
}

async function scan(){
  log('Scanning DTCs...', 'inf');
  try {
    const r = await window.api.scan();
    const list = $('dtc-list');
    list.innerHTML = '';
    if(r.vin){ $('m-vin').textContent = r.vin; $('vin').textContent = 'VIN: ' + r.vin; }
    if(!r.count){
      list.innerHTML = '<div class="empty ok-text">✓ No stored DTCs</div>';
      log('No DTCs stored', 'ok');
      toast('No trouble codes', 'ok');
      return;
    }
    r.dtcs.forEach(d => {
      const row = document.createElement('div');
      row.className = 'dtc-row';
      row.innerHTML = `<span class="code">${d.code}</span><span class="desc">${d.desc}</span>`;
      list.appendChild(row);
    });
    log(`Found ${r.count} DTC(s)`, 'err');
    toast(r.count + ' DTC(s) found');
  } catch(e) { log('Scan failed: ' + e.message, 'err'); toast(e.message, 'err'); }
}

async function clearDTCs(){
  if(!confirm('Clear all stored DTCs and freeze frame data?')) return;
  try {
    await window.api.clearDTCs();
    $('dtc-list').innerHTML = '<div class="empty ok-text">✓ Codes cleared</div>';
    log('DTCs cleared', 'ok'); toast('DTCs cleared', 'ok');
  } catch(e) { log('Clear failed: ' + e.message, 'err'); }
}

function fmt(v, dp){ return v == null ? '—' : (dp != null ? v.toFixed(dp) : v); }

async function pollLive(){
  try {
    const m = await window.api.liveMetrics();
    $('m-rpm').textContent      = fmt(m.rpm);
    $('m-speed').textContent    = fmt(m.speed_kph);
    $('m-coolant').textContent  = fmt(m.coolant_c);
    $('m-intake').textContent   = fmt(m.intake_c);
    $('m-load').textContent     = fmt(m.load_pct, 1);
    $('m-throttle').textContent = fmt(m.throttle_pct, 1);
    $('m-maf').textContent      = fmt(m.maf_gps, 2);
    $('m-fuel').textContent     = fmt(m.fuel_pct, 1);
    $('m-volt').textContent     = fmt(m.voltage, 1);
  } catch(e) { log('Live: ' + e.message, 'err'); stopLive(); }
}

function startLive(){
  if(liveTimer) return;
  $('btn-live').textContent = 'Stop';
  pollLive();
  liveTimer = setInterval(pollLive, 500);
}
function stopLive(){
  if(liveTimer){ clearInterval(liveTimer); liveTimer = null; }
  $('btn-live').textContent = 'Start';
}

$('btn-refresh').onclick    = refreshPorts;
$('btn-connect').onclick    = connect;
$('btn-disconnect').onclick = disconnect;
$('btn-scan').onclick       = scan;
$('btn-clear').onclick      = clearDTCs;
$('btn-live').onclick       = () => liveTimer ? stopLive() : startLive();

(async () => {
  if(!window.api){ log('Bridge not loaded — run via Electron, not browser', 'err'); return; }
  log('Ready. Click Refresh to list COM ports.', 'inf');
  await refreshPorts();
})();
</script>
</body>
</html>
