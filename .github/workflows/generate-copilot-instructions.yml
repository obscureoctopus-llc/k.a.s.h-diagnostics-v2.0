name: Generate Copilot System Guardrails

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - README.md
      - .github/workflows/generate-copilot-instructions.yml

permissions:
  contents: write

jobs:
  inject-guardrails:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Copilot instructions
        run: |
          set -Eeuo pipefail
          mkdir -p .github

          python <<'PY'
          from pathlib import Path
          import re

          readme_path = Path("README.md")
          output_path = Path(".github/copilot-instructions.md")

          sections_to_include = (
              "What It Does",
              "Architecture",
              "API Endpoints",
              "Environment Variables",
          )

          readme_text = readme_path.read_text(encoding="utf-8") if readme_path.exists() else ""
          heading_pattern = re.compile(r"^##\s+(.+)$", re.MULTILINE)
          matches = list(heading_pattern.finditer(readme_text))

          extracted_sections = {}
          for index, match in enumerate(matches):
              title = match.group(1).strip()
              start = match.end()
              end = matches[index + 1].start() if index + 1 < len(matches) else len(readme_text)
              body = readme_text[start:end].strip()
              if title in sections_to_include and body:
                  extracted_sections[title] = body

          lines = [
              "# Copilot Instructions",
              "",
              "> This file is generated by `.github/workflows/generate-copilot-instructions.yml`.",
              "",
              "## Core Guardrails",
              "",
              "- Keep K.A.S.H. Diagnostics as a local-first diagnostic platform with a Python backend and web UI.",
              "- Preserve real hardware behavior and avoid adding fake or simulated diagnostic data paths.",
              "- Prefer small, production-ready changes with clear error handling and no placeholders.",
              "- Reuse the documented endpoints, environment defaults, and workflow conventions already present in the repository.",
          ]

          for title in sections_to_include:
              body = extracted_sections.get(title)
              if body:
                  lines.extend(["", f"## {title}", "", body])

          output_path.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
          PY

      - name: Commit and push updated guardrails
        run: |
          set -Eeuo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add .github/copilot-instructions.md

          if git diff --cached --quiet; then
            echo "No guardrail changes detected."
            exit 0
          fi

          git commit -m "ci: update copilot instructions"
          git push
